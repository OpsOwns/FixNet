version: '3.8'
name: fixNet

services:
  fixNet.api:
    image: api
    build:
      context: .
      dockerfile: src/API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DbConnection=Server=fixNet.db;Database=FixNetDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - Redis__ConnectionString=fixNet.redis:6379
      - Keycloak__AuthServerUrl=http://fixnet.keycloak:8080
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - fixNet.db
      - fixNet.redis
      - fixNet.keycloak
    volumes:
        - "${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro"
        - "${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro"
  fixNet.redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
  
  fixNet.keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    ports:
      - "8081:8080"
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HEALTH_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
  
  fixNet.db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
      - ACCEPT_EULA=Y
    ports:
      - "1433:1433"
    volumes:
      - net-db:/var/opt/mssql

volumes:
  net-db:
  redis-data:
  